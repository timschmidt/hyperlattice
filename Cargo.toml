[package]
name = "realistic_blas"
version = "0.1.1"
edition = "2024"
description = "A small Rust linear algebra library with a crate-owned Scalar type and realistic or approximate backends."
authors = ["Timothy Schmidt <timschmidt@gmail.com>"]
license = "MIT"
repository = "https://github.com/timschmidt/realistic_blas"
readme = "README.md"
keywords = ["math", "blas", "matrices", "vectors", "linear-algebra"]
categories = ["mathematics"]

[dependencies]
num = { version = "0.4.3", optional = true }
realistic = { version = "0.8.1", optional = true }

[dev-dependencies]
arpfloat = { version = "0.1.11", default-features = false, features = ["std"] }
astro-float = "0.9.5"
criterion = "0.7.0"

[features]
default = ["realistic-backend"]
realistic-backend = ["dep:num", "dep:realistic"]
approx-backend = []

[[bench]]
name = "mathbench"
harness = false
