name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Rust checks (${{ matrix.backend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: realistic
            args: ""
          - name: approx
            args: "--no-default-features --features approx-backend"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --all-targets ${{ matrix.backend.args }}

      - name: Run tests
        run: cargo test --all-targets ${{ matrix.backend.args }}

      - name: Run Clippy
        run: cargo clippy --all-targets ${{ matrix.backend.args }} -- -D warnings
